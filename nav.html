<!-- SCROLL TO TOP FLOATING BUTTON              -->
<!-- ========================================== -->

<!-- 1. The Button HTML -->
<a href="#" id="scrollToTopBtn" class="button primary icon solid fa-arrow-up"></a>

<!-- 2. The Styling (CSS) -->
<style>
    #scrollToTopBtn {
        display: none; /* Hidden by default until the user scrolls */
        position: fixed; /* Floats on the screen */
        bottom: 40px; /* 40px from the bottom */
        right: 40px; /* 40px from the right */
        z-index: 9999; /* Ensures it stays on top of all other images/text */
        border-radius: 50%; /* Makes it a perfect circle */
        width: 55px;
        height: 55px;
        padding: 0;
        line-height: 55px; /* Centers the arrow perfectly */
        text-align: center;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.3); /* Adds a modern drop shadow */
        transition: transform 0.2s ease-in-out; /* Smooth hover effect */
    }

    /* Makes the button pop out slightly when hovered */
    #scrollToTopBtn:hover {
        transform: scale(1.1);
    }

    /* Shrinks the margins slightly on mobile phones so it isn't in the way */
    @media screen and (max-width: 736px) {
        #scrollToTopBtn {
            bottom: 20px;
            right: 20px;
        }
    }
</style>

<!-- 3. The Logic (JavaScript) -->
<script>
    $(document).ready(function() {
        // Listen for when the user scrolls the page
        $(window).scroll(function() {
            // If they scroll down more than 400 pixels, fade the button in
            if ($(this).scrollTop() > 400) {
                $('#scrollToTopBtn').fadeIn(300);
            } else {
                // If they are near the top, fade the button out
                $('#scrollToTopBtn').fadeOut(300);
            }
        });

        // When the button is clicked, scroll to the top smoothly
        $('#scrollToTopBtn').click(function(event) {
            event.preventDefault(); // Stop the default jump behavior
            $('html, body').animate({scrollTop: 0}, 600); // 600 milliseconds smooth scroll
        });
    });
</script>
